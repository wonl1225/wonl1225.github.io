<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Won Lee — Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.cards-hero {
  padding: 8rem 2.5rem 3rem;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.cards-hero h1 { font-family:'IM Fell English',serif; font-size:clamp(40px,6vw,72px); line-height:1; letter-spacing:-.01em; }
.cards-hero h1 em { font-style:italic; color:var(--blue); }
.cards-hero p { font-size:10px; color:var(--muted); letter-spacing:.12em; margin-top:.8rem; line-height:1.8; }
.back-link {
  font-size:9px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--muted); text-decoration:none;
  display:flex; align-items:center; gap:.5rem;
  transition:color .2s; align-self:flex-start; margin-top:.4rem;
}
.back-link:hover { color:var(--blue); }
.back-link::before { content:'←'; }

.cards-stage {
  padding: 5rem 2.5rem;
  display: flex; flex-wrap: wrap;
  gap: 4rem; justify-content: center; align-items: center;
  min-height: 60vh;
}

/* ── CARD WRAP ── */
.card-wrap {
  perspective: 800px;
  width: 260px; height: 363px;
  position: relative;
}
.card-wrap.dimmed { opacity: 0.15; transition: opacity 0.3s; }

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  border-radius: 12px;
  transform-style: preserve-3d;
  transition: transform 0.08s ease;
  will-change: transform;
  cursor: pointer;
}

.card-face {
  position: absolute; inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.card-face img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  user-select: none; pointer-events: none;
}
.card-back { transform: rotateY(180deg); }

.card-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; letter-spacing: .14em; color: rgba(255,255,255,.3);
}

/* holo shine */
.card-face::before {
  content:''; position:absolute; inset:0; z-index:2; border-radius:12px;
  background: radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.18) 0%, transparent 60%);
  mix-blend-mode: screen; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
/* rainbow */
.card-inner.active.type-rainbow .card-face::after {
  content:''; position:absolute; inset:0; z-index:3; border-radius:12px;
  background:
    repeating-linear-gradient(calc(var(--ry,0) * 2deg + 45deg),
      rgba(255,0,128,0.12) 0%, rgba(255,200,0,0.12) 14%,
      rgba(0,255,128,0.12) 28%, rgba(0,200,255,0.12) 42%,
      rgba(128,0,255,0.12) 56%, rgba(255,0,128,0.12) 70%),
    radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.08) 0%, transparent 70%);
  mix-blend-mode: color-dodge; opacity:1; pointer-events:none;
}
/* holo */
.card-inner.active.type-holo .card-face::after {
  content:''; position:absolute; inset:0; z-index:3; border-radius:12px;
  background:
    radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(180,220,255,0.22) 0%, rgba(160,100,255,0.10) 40%, transparent 70%),
    repeating-linear-gradient(calc(var(--ry,0) * 3deg + 60deg),
      rgba(255,255,255,0.04) 0%, rgba(180,220,255,0.08) 25%, rgba(255,255,255,0.04) 50%);
  mix-blend-mode: screen; opacity:1; pointer-events:none;
}
.card-inner.active .card-face::before { opacity: 1; }

.card-glare {
  position:absolute; inset:0; z-index:4; border-radius:12px;
  background: radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 30%, transparent 60%);
  mix-blend-mode: screen; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.card-inner.active .card-glare { opacity: 1; }

.card-wrap:hover .card-inner { box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px rgba(150,100,255,0.15); }

.card-label { text-align:center; margin-top:1rem; font-size:9px; letter-spacing:.14em; color:var(--muted2); }
.card-empty .card-placeholder { border:1px dashed var(--line); background:transparent; }

/* ── BACKDROP ── */
.card-backdrop {
  position: fixed; inset: 0; z-index: 500;
  width: 100vw; height: 100vh;
  min-height: -webkit-fill-available;
  background: rgba(22,24,23,0.85);
  backdrop-filter: blur(12px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.card-backdrop.open { opacity:1; pointer-events:all; }

/* ── FLYING CLONE ── */
/* A cloned card-wrap placed fixed on top, JS animates it */
.card-clone {
  position: fixed;
  z-index: 600;
  pointer-events: none;
  perspective: 800px;
  border-radius: 12px;
}
.card-clone .card-inner {
  width: 100%; height: 100%;
  cursor: default;
}
/* clone gets pointer events once landed */
.card-clone.landed { pointer-events: all; }

.close-hint {
  position: fixed; z-index: 700;
  bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  font-size: 8px; letter-spacing:.16em; color:rgba(255,255,255,.3);
  opacity: 0; transition: opacity 0.4s;
  pointer-events: none; white-space: nowrap;
}
.close-hint.visible { opacity:1; pointer-events: all; cursor: pointer; }

.cards-footer-note {
  padding: 2rem 2.5rem;
  font-size:9px; letter-spacing:.1em; color:var(--muted2);
  border-top: 1px solid var(--line);
}

@media(max-width:680px){
  .cards-hero { padding:6rem 1.2rem 2rem; }
  .cards-stage { padding:3rem 1.2rem; gap:2.5rem; }
  .card-wrap { width:200px; height:279px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-name">WON LEE</div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#about">Academic</a></li>
    <li><a href="index.html#research">Research</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#beyond">Beyond</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="card-backdrop" id="backdrop"></div>
<div class="close-hint" id="closeHint">click anywhere to close</div>

<div class="cards-hero">
  <div>
    <h1>Collection<em>.</em></h1>
    <p>Tinkaton, obviously.</p>
  </div>
  <a class="back-link" href="index.html">Back</a>
</div>

<div class="cards-stage" id="cardsStage"></div>
<div class="cards-footer-note">Hover · Click to inspect</div>

<script>
const BACK_IMG = "img/cards/card_back.png";

const CARDS = [
  { name:"Tinkaton ex · 262/193", img:"img/cards/tinkaton_262.jpg", type:"rainbow" },
  { name:"Tinkaton ex · 031", img:"img/cards/tinkaton_31.jpg", type:"holo" },
  { name:"Tinkaton ex · 240/193", img:"img/cards/tinkaton_240.png", type:"rainbow" },
  { name:"Tinkaton ex · TCG Pocket", img:"img/cards/tinkaton_SIR.jpg", type:"rainbow"},
  { name:"Tinkaton ex · TCG Pocket", img:"img/cards/tinkaton_SIR2.jpg", type:"rainbow"},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let clone       = null;   // the flying clone element
let activeWrap  = null;
let lbTiltRaf   = null;
let lbTiltFn    = null;
let isAnimating = false;
let isOpen      = false;

const backdrop  = document.getElementById('backdrop');
const closeHint = document.getElementById('closeHint');

function easeOutQuint(t) { return 1 - Math.pow(1-t, 5); }

// ── BUILD CLONE ───────────────────────────────────────────────────────────────
function buildClone(wrap, card) {
  const el = document.createElement('div');
  el.className = 'card-clone';

  const inner = document.createElement('div');
  inner.className = 'card-inner' + (card.type ? ` type-${card.type}` : '');
  inner.style.transition = 'none';

  // front
  const front = document.createElement('div');
  front.className = 'card-face card-front';
  const img = document.createElement('img');
  img.src = card.img; img.alt = card.name; img.draggable = false;
  front.appendChild(img);
  const glare = document.createElement('div');
  glare.className = 'card-glare';
  front.appendChild(glare);
  inner.appendChild(front);

  // back
  const back = document.createElement('div');
  back.className = 'card-face card-back';
  const bImg = document.createElement('img');
  bImg.src = BACK_IMG; bImg.alt = 'card back'; bImg.draggable = false;
  back.appendChild(bImg);
  inner.appendChild(back);

  el.appendChild(inner);
  return { el, inner, front };
}

// ── FLY ANIMATION ─────────────────────────────────────────────────────────────
function fly(el, from, to, spinDir, duration, onDone) {
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const raw = Math.min((ts - start) / duration, 1);
    const t   = easeOutQuint(raw);

    el.style.left   = (from.left   + (to.left   - from.left)   * t) + 'px';
    el.style.top    = (from.top    + (to.top    - from.top)    * t) + 'px';
    el.style.width  = (from.width  + (to.width  - from.width)  * t) + 'px';
    el.style.height = (from.height + (to.height - from.height) * t) + 'px';

    const spin = spinDir * 360 * t;
    el.querySelector('.card-inner').style.transform = `rotateY(${spin}deg)`;

    if (raw < 1) requestAnimationFrame(step);
    else onDone();
  }
  requestAnimationFrame(step);
}

// ── OPEN ──────────────────────────────────────────────────────────────────────
function openCard(wrap, card) {
  if (isAnimating || isOpen) return;
  isAnimating = true;
  activeWrap = wrap;

  const srcRect = wrap.getBoundingClientRect();
  const maxW  = Math.min(420, window.innerWidth * 0.82);
  const ratio = srcRect.height / srcRect.width;
  const dstW  = maxW, dstH = maxW * ratio;
  const dstRect = {
    left: (window.innerWidth  - dstW) / 2,
    top:  (window.innerHeight - dstH) / 2,
    width: dstW, height: dstH
  };

  const built = buildClone(wrap, card);
  clone = built.el;

  clone.style.left   = srcRect.left   + 'px';
  clone.style.top    = srcRect.top    + 'px';
  clone.style.width  = srcRect.width  + 'px';
  clone.style.height = srcRect.height + 'px';
  document.body.appendChild(clone);

  // dim all wraps
  document.querySelectorAll('.card-wrap').forEach(w => w.classList.add('dimmed'));
  backdrop.classList.add('open');

  fly(clone, srcRect, dstRect, 1, 720, () => {
    isAnimating = false;
    isOpen = true;
    clone.classList.add('landed');
    built.inner.classList.add('active');
    closeHint.classList.add('visible');
    attachTilt(built.inner, built.front);
  });
}

// ── CLOSE ─────────────────────────────────────────────────────────────────────
function closeCard() {
  if (isAnimating || !isOpen || !clone) return;
  isAnimating = true;
  isOpen = false;

  closeHint.classList.remove('visible');
  backdrop.classList.remove('open');

  if (lbTiltFn) { window.removeEventListener('mousemove', lbTiltFn); lbTiltFn = null; }
  cancelAnimationFrame(lbTiltRaf);

  // reset tilt on clone before flying back
  clone.querySelector('.card-inner').style.transform = 'rotateY(0deg)';

  const srcRect = clone.getBoundingClientRect();
  const dstRect = activeWrap.getBoundingClientRect();

  document.querySelectorAll('.card-wrap').forEach(w => w.classList.remove('dimmed'));

  fly(clone, srcRect, dstRect, -1, 650, () => {
    clone.remove();
    clone = null;
    activeWrap = null;
    isAnimating = false;
  });
}

// ── TILT ON EXPANDED CLONE ────────────────────────────────────────────────────
function attachTilt(inner, front) {
  lbTiltFn = (e) => {
    cancelAnimationFrame(lbTiltRaf);
    lbTiltRaf = requestAnimationFrame(() => {
      const b = inner.getBoundingClientRect();
      const x = e.clientX - b.left, y = e.clientY - b.top;
      const rx = ((y - b.height/2) / (b.height/2)) * -14;
      const ry = ((x - b.width/2)  / (b.width/2))  * 14;
      inner.style.transition = 'transform 0.08s ease';
      inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      inner.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
      inner.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
      inner.style.setProperty('--ry', ry);
      front.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
      front.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
      front.style.setProperty('--ry', ry);
    });
  };
  window.addEventListener('mousemove', lbTiltFn);
}

// ── CLOSE TRIGGERS ────────────────────────────────────────────────────────────
backdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });
closeHint.addEventListener('click', closeCard);

// ── RENDER ────────────────────────────────────────────────────────────────────
const stage = document.getElementById('cardsStage');

CARDS.forEach(card => {
  const isEmpty = !card.img && !card.name;
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap' + (isEmpty ? ' card-empty' : '');

  const inner = document.createElement('div');
  inner.className = 'card-inner' + (card.type ? ` type-${card.type}` : '');

  const front = document.createElement('div');
  front.className = 'card-face card-front';
  if (card.img) {
    const img = document.createElement('img');
    img.src = card.img; img.alt = card.name; img.draggable = false;
    front.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-placeholder';
    ph.textContent = card.name || 'coming soon';
    front.appendChild(ph);
  }
  const glare = document.createElement('div');
  glare.className = 'card-glare';
  front.appendChild(glare);
  inner.appendChild(front);

  const back = document.createElement('div');
  back.className = 'card-face card-back';
  const bImg = document.createElement('img');
  bImg.src = BACK_IMG; bImg.alt = 'card back'; bImg.draggable = false;
  back.appendChild(bImg);
  inner.appendChild(back);

  wrap.appendChild(inner);

  if (card.name) {
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = card.name;
    wrap.appendChild(label);
  }

  stage.appendChild(wrap);
  if (isEmpty) return;

  // click
  wrap.addEventListener('click', () => {
    if (isOpen) closeCard();
    else if (card.img) openCard(wrap, card);
  });

  // hover tilt
  let rafId;
  wrap.addEventListener('mouseenter', () => { if (!isOpen) inner.classList.add('active'); });
  wrap.addEventListener('mouseleave', () => {
    inner.classList.remove('active');
    cancelAnimationFrame(rafId);
    inner.style.transform = '';
    inner.style.removeProperty('--mx');
    inner.style.removeProperty('--my');
    inner.style.removeProperty('--ry');
  });
  wrap.addEventListener('mousemove', (e) => {
    if (isOpen) return;
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      const b = wrap.getBoundingClientRect();
      const x = e.clientX - b.left, y = e.clientY - b.top;
      const rx = ((y - b.height/2) / (b.height/2)) * -14;
      const ry = ((x - b.width/2)  / (b.width/2))  * 14;
      inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      front.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
      front.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
      front.style.setProperty('--ry', ry);
    });
  });

  // touch tilt + holo
  wrap.addEventListener('touchstart', () => {
    if (!isOpen) inner.classList.add('active');
  }, { passive: true });
  wrap.addEventListener('touchmove', (e) => {
    if (isOpen) return;
    e.preventDefault();
    const t = e.touches[0];
    const b = wrap.getBoundingClientRect();
    const x = t.clientX - b.left, y = t.clientY - b.top;
    const rx = ((y - b.height/2) / (b.height/2)) * -12;
    const ry = ((x - b.width/2)  / (b.width/2))  * 12;
    inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    front.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
    front.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
    front.style.setProperty('--ry', ry);
  }, { passive: false });
  wrap.addEventListener('touchend', () => {
    inner.classList.remove('active');
    inner.style.transform = '';
  });
});
</script>
<script src="js/main.js"></script>
</body>
</html>
