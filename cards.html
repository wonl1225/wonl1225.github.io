<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Won Lee — Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.cards-hero {
  padding: 8rem 2.5rem 3rem;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.cards-hero h1 { font-family:'IM Fell English',serif; font-size:clamp(40px,6vw,72px); line-height:1; letter-spacing:-.01em; }
.cards-hero h1 em { font-style:italic; color:var(--blue); }
.cards-hero p { font-size:10px; color:var(--muted); letter-spacing:.12em; margin-top:.8rem; line-height:1.8; }
.back-link {
  font-size:9px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--muted); text-decoration:none;
  display:flex; align-items:center; gap:.5rem;
  transition:color .2s; align-self:flex-start; margin-top:.4rem;
}
.back-link:hover { color:var(--blue); }
.back-link::before { content:'←'; }

.cards-stage {
  padding: 5rem 2.5rem;
  display: flex; flex-wrap: wrap;
  gap: 4rem; justify-content: center; align-items: center;
  min-height: 60vh;
}

/* ── CARD WRAP ── */
.card-wrap {
  perspective: 800px;
  width: 260px; height: 363px;
  position: relative;
}

.card-inner {
  width: 100%; height: 100%;
  position: relative;
  border-radius: 12px;
  transform-style: preserve-3d;
  transition: transform 0.1s ease, box-shadow 0.3s ease;
  will-change: transform;
}

/* when flying — disable hover transition so JS controls it */
.card-inner.flying {
  transition: none !important;
  pointer-events: none;
}

.card-face {
  position: absolute; inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
}
.card-face img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  user-select: none; pointer-events: none;
}
.card-back { transform: rotateY(180deg); }

.card-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; letter-spacing: .14em; color: rgba(255,255,255,.3);
}

/* holo layers on faces */
.card-face::before {
  content:''; position:absolute; inset:0; z-index:2; border-radius:12px;
  background: radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.18) 0%, transparent 60%);
  mix-blend-mode: screen; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
/* rainbow — full color-dodge (ex SIR / IR) */
.card-inner.active.type-rainbow .card-face::after {
  content:''; position:absolute; inset:0; z-index:3; border-radius:12px;
  background:
    repeating-linear-gradient(calc(var(--ry,0) * 2deg + 45deg),
      rgba(255,0,128,0.12) 0%, rgba(255,200,0,0.12) 14%,
      rgba(0,255,128,0.12) 28%, rgba(0,200,255,0.12) 42%,
      rgba(128,0,255,0.12) 56%, rgba(255,0,128,0.12) 70%),
    radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.08) 0%, transparent 70%);
  mix-blend-mode: color-dodge; opacity:1; pointer-events:none;
}
/* holo — subtle shimmer (regular ex / holo rare) */
.card-inner.active.type-holo .card-face::after {
  content:''; position:absolute; inset:0; z-index:3; border-radius:12px;
  background:
    radial-gradient(ellipse at var(--mx,50%) var(--my,50%),
      rgba(180,220,255,0.22) 0%, rgba(160,100,255,0.10) 40%, transparent 70%),
    repeating-linear-gradient(calc(var(--ry,0) * 3deg + 60deg),
      rgba(255,255,255,0.04) 0%, rgba(180,220,255,0.08) 25%,
      rgba(255,255,255,0.04) 50%);
  mix-blend-mode: screen; opacity:1; pointer-events:none;
}
.card-inner.active .card-face::before { opacity: 1; }

.card-glare {
  position:absolute; inset:0; z-index:4; border-radius:12px;
  background: radial-gradient(ellipse at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 30%, transparent 60%);
  mix-blend-mode: screen; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
.card-inner.active .card-glare { opacity: 1; }

.card-wrap:hover .card-inner:not(.flying) {
  box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px rgba(150,100,255,0.15);
}

.card-label {
  text-align:center; margin-top:1rem;
  font-size:9px; letter-spacing:.14em; color:var(--muted2);
}
.card-empty .card-placeholder {
  border:1px dashed var(--line); background:transparent;
}

/* ── BACKDROP (dim only, no card here) ── */
.card-backdrop {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(22,24,23,0.82);
  backdrop-filter: blur(10px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s;
}
.card-backdrop.open { opacity:1; pointer-events:all; }

/* ── FLYING CARD CLONE ── */
/* We animate the actual card-inner using fixed positioning via JS */
.card-inner.fixed-fly {
  position: fixed;
  z-index: 600;
  margin: 0;
  border-radius: 16px;
  transform-style: preserve-3d;
  pointer-events: none;
}

.close-hint {
  position: fixed; z-index: 601;
  bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  font-size: 8px; letter-spacing:.16em; color:rgba(255,255,255,.3);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.close-hint.visible { opacity:1; }

.cards-footer-note {
  padding: 2rem 2.5rem;
  font-size:9px; letter-spacing:.1em; color:var(--muted2);
  border-top: 1px solid var(--line);
}

@media(max-width:680px){
  .cards-hero { padding:6rem 1.2rem 2rem; }
  .cards-stage { padding:3rem 1.2rem; gap:2.5rem; }
  .card-wrap { width:200px; height:279px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-name">WON LEE</div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#about">Academic</a></li>
    <li><a href="index.html#research">Research</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#beyond">Beyond</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="card-backdrop" id="backdrop"></div>
<div class="close-hint" id="closeHint">click anywhere to close</div>

<div class="cards-hero">
  <div>
    <h1>Collection<em>.</em></h1>
    <p>Tinkaton, obviously.</p>
  </div>
  <a class="back-link" href="index.html">Back</a>
</div>

<div class="cards-stage" id="cardsStage"></div>
<div class="cards-footer-note">Hover · Click to inspect</div>

<script>
const BACK_IMG = "img/cards/card_back.png";

const CARDS = [
  { name:"Tinkaton ex · 262/193", img:"img/cards/tinkaton_262.png", type:"rainbow" },
  { name:"Tinkaton ex · 240/193", img:"img/cards/tinkaton_31.png", type:"holo" },
  { name:"Tinkaton ex · SIR",     img:"img/cards/tinkaton_240.png", type:"rainbow" },
  { name:"", img:"" },
  { name:"", img:"" },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeInner = null;   // the card-inner currently expanded
let activeWrap  = null;
let lbTiltRaf   = null;
let lbTiltHandler = null;
let isAnimating = false;

const backdrop  = document.getElementById('backdrop');
const closeHint = document.getElementById('closeHint');

// ── EASING ────────────────────────────────────────────────────────────────────
function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
function easeInQuint(t)  { return t * t * t * t * t; }

// ── ANIMATE card from srcRect → dstRect with spin ────────────────────────────
function animateFly(inner, srcRect, dstRect, spinDir, duration, easeFn, onDone) {
  // reparent to fixed so it escapes scroll/perspective
  const origParent = inner.parentElement;
  const origStyle  = inner.getAttribute('style') || '';

  // record original layout styles to restore
  inner.classList.add('fixed-fly');
  inner.style.width   = srcRect.width  + 'px';
  inner.style.height  = srcRect.height + 'px';
  inner.style.left    = srcRect.left   + 'px';
  inner.style.top     = srcRect.top    + 'px';
  inner.style.transform = 'rotateY(0deg) scale(1)';

  document.body.appendChild(inner);

  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const raw = Math.min((ts - start) / duration, 1);
    const t   = easeFn(raw);

    const x = srcRect.left + (dstRect.left - srcRect.left) * t;
    const y = srcRect.top  + (dstRect.top  - srcRect.top)  * t;
    const w = srcRect.width  + (dstRect.width  - srcRect.width)  * t;
    const h = srcRect.height + (dstRect.height - srcRect.height) * t;
    const spin = spinDir * 360 * t;
    const scale = 1; // size handled by w/h

    inner.style.left      = x + 'px';
    inner.style.top       = y + 'px';
    inner.style.width     = w + 'px';
    inner.style.height    = h + 'px';
    inner.style.transform = `rotateY(${spin}deg)`;

    if (raw < 1) {
      requestAnimationFrame(step);
    } else {
      onDone(inner, origParent, origStyle);
    }
  }
  requestAnimationFrame(step);
}

// ── OPEN ──────────────────────────────────────────────────────────────────────
function openCard(inner, wrap) {
  if (isAnimating) return;
  isAnimating = true;

  inner.classList.remove('active');
  activeInner = inner;
  activeWrap  = wrap;

  // hide original slot
  inner.style.visibility = 'hidden'; // keep layout space
  // actually inner will be reparented so we need a placeholder opacity
  wrap.style.opacity = '0';

  const srcRect = inner.getBoundingClientRect();

  // target: centered, max 420px wide, maintain aspect
  const aspect = srcRect.height / srcRect.width;
  const maxW   = Math.min(420, window.innerWidth * 0.82);
  const dstW   = maxW;
  const dstH   = dstW * aspect;
  const dstLeft = (window.innerWidth  - dstW) / 2;
  const dstTop  = (window.innerHeight - dstH) / 2;
  const dstRect = { left:dstLeft, top:dstTop, width:dstW, height:dstH };

  backdrop.classList.add('open');

  animateFly(inner, srcRect, dstRect, 1, 700, easeOutQuint, (el) => {
    // landed — attach tilt
    isAnimating = false;
    closeHint.classList.add('visible');
    attachLbTilt(el, dstRect);
  });
}

// ── CLOSE ─────────────────────────────────────────────────────────────────────
function closeCard() {
  if (isAnimating || !activeInner) return;
  isAnimating = true;

  closeHint.classList.remove('visible');
  backdrop.classList.remove('open');

  if (lbTiltHandler) {
    window.removeEventListener('mousemove', lbTiltHandler);
    lbTiltHandler = null;
  }
  cancelAnimationFrame(lbTiltRaf);

  const inner = activeInner;
  const wrap  = activeWrap;

  // current position (wherever tilt left it — reset first)
  inner.style.transform = 'rotateY(0deg)';
  const srcRect = inner.getBoundingClientRect();

  // destination: original wrap position
  // wrap is still in DOM, opacity 0
  const dstRect = wrap.getBoundingClientRect();
  // adjust for the card-inner offset inside wrap (should be same)
  const target = {
    left: dstRect.left, top: dstRect.top,
    width: dstRect.width, height: dstRect.height
  };

  animateFly(inner, srcRect, target, -1, 650, easeOutQuint, (el) => {
    el.classList.remove('fixed-fly');
    el.removeAttribute('style');
    // re-insert as first child of wrap
    wrap.insertBefore(el, wrap.firstChild);
    wrap.style.opacity = '1';
    activeInner = null;
    activeWrap  = null;
    isAnimating = false;
  });
}

// ── LIGHTBOX TILT ─────────────────────────────────────────────────────────────
function attachLbTilt(inner, rect) {
  lbTiltHandler = (e) => {
    cancelAnimationFrame(lbTiltRaf);
    lbTiltRaf = requestAnimationFrame(() => {
      // re-read rect in case window resized
      const b = inner.getBoundingClientRect();
      const x = e.clientX - b.left;
      const y = e.clientY - b.top;
      const rx = ((y - b.height/2) / (b.height/2)) * -14;
      const ry = ((x - b.width/2)  / (b.width/2))  * 14;
      inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      inner.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
      inner.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
      inner.style.setProperty('--ry', ry);
    });
  };
  window.addEventListener('mousemove', lbTiltHandler);
}

// ── CLOSE TRIGGERS ────────────────────────────────────────────────────────────
backdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });
closeHint.addEventListener('click', closeCard);

// ── RENDER ────────────────────────────────────────────────────────────────────
const stage = document.getElementById('cardsStage');

CARDS.forEach(card => {
  const isEmpty = !card.img && !card.name;
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap' + (isEmpty ? ' card-empty' : '');

  const inner = document.createElement('div');
  inner.className = 'card-inner' + (card.type ? ` type-${card.type}` : '');

  // front face
  const front = document.createElement('div');
  front.className = 'card-face card-front';
  if (card.img) {
    const img = document.createElement('img');
    img.src = card.img; img.alt = card.name; img.draggable = false;
    front.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-placeholder';
    ph.textContent = card.name || 'coming soon';
    front.appendChild(ph);
  }
  const glare = document.createElement('div');
  glare.className = 'card-glare';
  front.appendChild(glare);
  inner.appendChild(front);

  // back face
  const back = document.createElement('div');
  back.className = 'card-face card-back';
  const bImg = document.createElement('img');
  bImg.src = BACK_IMG; bImg.alt = 'card back'; bImg.draggable = false;
  back.appendChild(bImg);
  inner.appendChild(back);

  wrap.appendChild(inner);

  if (card.name) {
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = card.name;
    wrap.appendChild(label);
  }

  stage.appendChild(wrap);

  if (isEmpty) return;

  // click
  wrap.addEventListener('click', () => {
    if (activeInner) closeCard();
    else if (card.img) openCard(inner, wrap);
  });

  // hover tilt
  let rafId;
  wrap.addEventListener('mouseenter', () => {
    if (activeInner) return;
    inner.classList.add('active');
  });
  wrap.addEventListener('mouseleave', () => {
    inner.classList.remove('active');
    cancelAnimationFrame(rafId);
    inner.style.transform = '';
    inner.style.removeProperty('--mx');
    inner.style.removeProperty('--my');
    inner.style.removeProperty('--ry');
  });
  wrap.addEventListener('mousemove', (e) => {
    if (activeInner) return;
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      const b = wrap.getBoundingClientRect();
      const x = e.clientX - b.left, y = e.clientY - b.top;
      const rx = ((y - b.height/2) / (b.height/2)) * -14;
      const ry = ((x - b.width/2)  / (b.width/2))  * 14;
      inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      front.style.setProperty('--mx', (x/b.width*100).toFixed(1)+'%');
      front.style.setProperty('--my', (y/b.height*100).toFixed(1)+'%');
      front.style.setProperty('--ry', ry);
    });
  });

  // touch
  wrap.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const b = wrap.getBoundingClientRect();
    const x = t.clientX - b.left, y = t.clientY - b.top;
    const rx = ((y - b.height/2) / (b.height/2)) * -12;
    const ry = ((x - b.width/2)  / (b.width/2))  * 12;
    inner.classList.add('active');
    inner.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
  }, { passive:false });
  wrap.addEventListener('touchend', () => {
    inner.classList.remove('active');
    inner.style.transform = '';
  });
});
</script>
<script src="js/main.js"></script>
</body>
</html>
