<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Won Lee — Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.music-hero{
  padding:8rem 2.5rem 3rem;
  border-bottom:1px solid var(--line);
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
}
.music-hero-left h1{
  font-family:'IM Fell English',serif;
  font-size:clamp(40px,6vw,72px);
  line-height:1;letter-spacing:-.01em;
}
.music-hero-left h1 em{font-style:italic;color:var(--blue);}
.music-hero-left p{
  font-size:10px;color:var(--muted);
  letter-spacing:.12em;margin-top:.8rem;line-height:1.8;
}
.music-hero-left p a{
  color:var(--blue);text-decoration:none;
  border-bottom:1px solid rgba(26,111,212,0.3);
  transition:border-color .2s;
}
.music-hero-left p a:hover{border-color:var(--blue);}
.back-link{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:.5rem;
  transition:color .2s;align-self:flex-start;margin-top:.4rem;
}
.back-link:hover{color:var(--blue);}
.back-link::before{content:'←';}

/* GRID */
.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1px;
  background:var(--line);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.album-card{
  background:var(--bg);
  aspect-ratio:1;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.album-card img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .4s cubic-bezier(.4,0,.2,1),filter .4s;
  filter:saturate(0.9);
}
.album-card:hover img{transform:scale(1.04);filter:saturate(1);}
.album-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(22,24,23,0.92) 0%, rgba(22,24,23,0.2) 50%, transparent 100%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:1.2rem;
}
.album-card:hover .album-overlay{opacity:1;}
.album-title{
  font-family:'IM Fell English',serif;
  font-size:.9rem;color:#fff;line-height:1.2;margin-bottom:.3rem;
}
.album-artist{
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.6);
}
.album-card a{position:absolute;inset:0;z-index:2;}

/* placeholder while loading */
.album-placeholder{
  width:100%;height:100%;
  background:var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;letter-spacing:.1em;color:var(--muted2);
}

/* footer note */
.music-footer-note{
  padding:2rem 2.5rem;
  font-size:9px;letter-spacing:.1em;color:var(--muted2);
  border-top:1px solid var(--line);
}

@media(max-width:680px){
  .music-hero{padding:6rem 1.2rem 2rem;}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .music-footer-note{padding:1.5rem 1.2rem;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-name">WON LEE</div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#about">Academic</a></li>
    <li><a href="index.html#research">Research</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#beyond">Beyond</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="music-hero">
  <div class="music-hero-left">
    <h1>Listening<em>.</em></h1>
    <p>
      A running shelf of records that stuck.<br>
      Full profile on <a href="https://rateyourmusic.com/~dnjsfl" target="_blank" rel="noopener">RYM ↗</a>
    </p>
  </div>
  <a class="back-link" href="index.html">Back</a>
</div>

<div class="album-grid" id="albumGrid"></div>

<div class="music-footer-note">
  Covers via Cover Art Archive · Click any record to open on RYM
</div>

<script>
// ── ALBUM DATA ──────────────────────────────────────────────────────────────
// To add more: copy a block, fill in title/artist/rym + mbid from MusicBrainz.
// MusicBrainz search: https://musicbrainz.org/search
// Cover art URL: https://coverartarchive.org/release/{mbid}/front
const ALBUMS = [
  {
    title: "White Light / White Heat",
    artist: "The Velvet Underground",
    rym: "https://rateyourmusic.com/release/album/the-velvet-underground/white-light-white-heat/",
    mbid: "b3e91534-6f44-4c79-9fbb-34c4de4c0e51"
  },
  {
    title: "무너지기",
    artist: "공중도둑",
    rym: "https://rateyourmusic.com/release/album/%EA%B3%B5%EC%A4%91%EB%8F%84%EB%91%91/%EB%AC%B4%EB%84%88%EC%A7%80%EA%B8%B0/",
    mbid: "3d8c0b3f-1f3e-4b2a-9c8e-2f4a6d7e8b9c"
  },
  {
    title: "Ascension (Edition I)",
    artist: "John Coltrane",
    rym: "https://rateyourmusic.com/release/album/john-coltrane/ascension-edition-i/",
    mbid: "a9c5e7f2-3b4d-4e6a-8f1c-9d2e5b7a3c4f"
  },
  {
    title: "Black Messiah",
    artist: "D'Angelo and the Vanguard",
    rym: "https://rateyourmusic.com/release/album/dangelo-and-the-vanguard/black-messiah/",
    mbid: "5b8f3a2e-1c4d-4f7a-9e2b-6d8c1a5f3e7b"
  },
  {
    title: "Red",
    artist: "King Crimson",
    rym: "https://rateyourmusic.com/release/album/king-crimson/red/",
    mbid: "6b4f2a8e-3c5d-4e9a-7f1b-2d6c8a4f5e3b"
  },
  {
    title: "Loveless",
    artist: "My Bloody Valentine",
    rym: "https://rateyourmusic.com/release/album/my-bloody-valentine/loveless/",
    mbid: "9f2e5b3a-1d4c-4f8a-6e7b-3c8d2a5f1e4b"
  },
];

// ── RENDER ──────────────────────────────────────────────────────────────────
const grid = document.getElementById('albumGrid');

ALBUMS.forEach(album => {
  const card = document.createElement('div');
  card.className = 'album-card';

  const coverUrl = `https://coverartarchive.org/release/${album.mbid}/front`;

  card.innerHTML = `
    <img
      src="${coverUrl}"
      alt="${album.title}"
      loading="lazy"
      onerror="this.parentElement.querySelector('.album-placeholder').style.display='flex';this.style.display='none';"
    >
    <div class="album-placeholder" style="display:none;position:absolute;inset:0;">
      ${album.title}
    </div>
    <div class="album-overlay">
      <div class="album-title">${album.title}</div>
      <div class="album-artist">${album.artist}</div>
    </div>
    <a href="${album.rym}" target="_blank" rel="noopener" aria-label="${album.title} on RYM"></a>
  `;

  grid.appendChild(card);
});
</script>
<script src="js/main.js"></script>
</body>
</html>
