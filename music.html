<style>
.music-hero{
  padding:8rem 2.5rem 3rem;
  border-bottom:1px solid var(--line);
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
}
.music-hero-left h1{
  font-family:'IM Fell English',serif;
  font-size:clamp(40px,6vw,72px);
  line-height:1;letter-spacing:-.01em;
}
.music-hero-left h1 em{font-style:italic;color:var(--blue);}
.music-hero-left p{
  font-size:10px;color:var(--muted);
  letter-spacing:.12em;margin-top:.8rem;line-height:1.8;
}
.music-hero-left p a{
  color:var(--blue);text-decoration:none;
  border-bottom:1px solid rgba(26,111,212,0.3);
  transition:border-color .2s;
}
.music-hero-left p a:hover{border-color:var(--blue);}
.back-link{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:.5rem;
  transition:color .2s;align-self:flex-start;margin-top:.4rem;
}
.back-link:hover{color:var(--blue);}
.back-link::before{content:'←';}

/* GRID */
.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1px;
  background:var(--line);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.album-card{
  background:var(--bg);
  aspect-ratio:1;
  position:relative;overflow:hidden;
  cursor:none;
}
.album-card img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .4s cubic-bezier(.4,0,.2,1),filter .4s;
  filter:saturate(0.88);
}
.album-card:hover img{transform:scale(1.04);filter:saturate(1);}
.album-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(22,24,23,0.92) 0%, rgba(22,24,23,0.2) 50%, transparent 100%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:1.4rem;
}
.album-card:hover .album-overlay{opacity:1;}
.album-title{
  font-family:'IM Fell English',serif;
  font-size:1rem;color:#fff;line-height:1.2;margin-bottom:.35rem;
}
.album-artist{
  font-size:8px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
}
.album-card a{position:absolute;inset:0;z-index:2;}

.album-placeholder{
  position:absolute;inset:0;
  background:#e8eae7;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;letter-spacing:.1em;color:var(--muted2);
  text-align:center;padding:1rem;
}

/* footer note */
.music-footer-note{
  padding:2rem 2.5rem;
  font-size:9px;letter-spacing:.1em;color:var(--muted2);
  border-top:1px solid var(--line);
}

@media(max-width:680px){
  .music-hero{padding:6rem 1.2rem 2rem;}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .music-footer-note{padding:1.5rem 1.2rem;}
}
</style>
