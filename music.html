<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Won Lee — Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.music-hero{
  padding:8rem 2.5rem 3rem;
  border-bottom:1px solid var(--line);
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
}
.music-hero-left h1{
  font-family:'IM Fell English',serif;
  font-size:clamp(40px,6vw,72px);
  line-height:1;letter-spacing:-.01em;
}
.music-hero-left h1 em{font-style:italic;color:var(--blue);}
.music-hero-left p{
  font-size:10px;color:var(--muted);
  letter-spacing:.12em;margin-top:.8rem;line-height:1.8;
}
.music-hero-left p a{
  color:var(--blue);text-decoration:none;
  border-bottom:1px solid rgba(26,111,212,0.3);
  transition:border-color .2s;
}
.music-hero-left p a:hover{border-color:var(--blue);}
.back-link{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:.5rem;
  transition:color .2s;align-self:flex-start;margin-top:.4rem;
}
.back-link:hover{color:var(--blue);}
.back-link::before{content:'←';}

/* GRID */
.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1px;
  background:var(--line);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.album-card{
  background:var(--bg);
  aspect-ratio:1;
  position:relative;overflow:hidden;
  cursor:none;
}
.album-card img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .4s cubic-bezier(.4,0,.2,1),filter .4s;
  filter:saturate(0.88);
}
.album-card:hover img{transform:scale(1.04);filter:saturate(1);}
.album-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top, rgba(22,24,23,0.92) 0%, rgba(22,24,23,0.2) 50%, transparent 100%);
  opacity:0;transition:opacity .3s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:1.4rem;
}
.album-card:hover .album-overlay{opacity:1;}
.album-title{
  font-family:'IM Fell English',serif;
  font-size:1rem;color:#fff;line-height:1.2;margin-bottom:.35rem;
}
.album-artist{
  font-size:8px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.55);
}
.album-card a{position:absolute;inset:0;z-index:2;}

.album-placeholder{
  position:absolute;inset:0;
  background:#e8eae7;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;letter-spacing:.1em;color:var(--muted2);
  text-align:center;padding:1rem;
}

/* footer note */
.music-footer-note{
  padding:2rem 2.5rem;
  font-size:9px;letter-spacing:.1em;color:var(--muted2);
  border-top:1px solid var(--line);
}

@media(max-width:680px){
  .music-hero{padding:6rem 1.2rem 2rem;}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  .music-footer-note{padding:1.5rem 1.2rem;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <div class="nav-name">WON LEE</div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html#about">Academic</a></li>
    <li><a href="index.html#research">Research</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#beyond">Beyond</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="music-hero">
  <div class="music-hero-left">
    <h1>Listening<em>.</em></h1>
    <p>
      A running shelf of records that stuck.<br>
      Full profile on <a href="https://rateyourmusic.com/~dnjsfl" target="_blank" rel="noopener">RYM ↗</a>
    </p>
  </div>
  <a class="back-link" href="index.html">Back</a>
</div>

<div class="album-grid" id="albumGrid"></div>

<div class="music-footer-note">
  Covers via Cover Art Archive · Click any record to open on RYM
</div>

<script>
// ── ALBUM DATA ──────────────────────────────────────────────────────────────
// To add: copy a block, fill in title/artist/rym, put cover jpg in img/ folder.
const ALBUMS = [
  {
    title: "White Light / White Heat",
    artist: "The Velvet Underground",
    rym: "https://rateyourmusic.com/release/album/the-velvet-underground/white-light-white-heat/",
    cover: "img/whitelight_whiteheat.jpg"
  },
  {
    title: "무너지기",
    artist: "공중도둑",
    rym: "https://rateyourmusic.com/release/album/%EA%B3%B5%EC%A4%91%EB%8F%84%EB%91%91/%EB%AC%B4%EB%84%88%EC%A7%80%EA%B8%B0/",
    cover: "img/crumbling.jpg"
  },
  {
    title: "Ascension (Edition I)",
    artist: "John Coltrane",
    rym: "https://rateyourmusic.com/release/album/john-coltrane/ascension-edition-i/",
    cover: "img/ascension.jpg"
  },
  {
    title: "Black Messiah",
    artist: "D'Angelo and the Vanguard",
    rym: "https://rateyourmusic.com/release/album/dangelo-and-the-vanguard/black-messiah/",
    cover: "img/blackmessiah.jpg"
  },
  {
    title: "Red",
    artist: "King Crimson",
    rym: "https://rateyourmusic.com/release/album/king-crimson/red/",
    cover: "img/red.jpg"
  },
  {
    title: "Loveless",
    artist: "My Bloody Valentine",
    rym: "https://rateyourmusic.com/release/album/my-bloody-valentine/loveless/",
    cover: "img/loveless.jpg"
  },  
  {
    title: "빌린 입",
    artist: "이민휘",
    rym: "https://rateyourmusic.com/release/album/%EC%9D%B4%EB%AF%BC%ED%9C%98/%EB%B9%8C%EB%A6%B0-%EC%9E%85/",
    cover: "img/borrowedtongue.jpg"
  },
  {
    title: "Songs in the Key of Life",
    artist: "Stevie Wonder",
    rym: "https://rateyourmusic.com/release/album/stevie-wonder/songs-in-the-key-of-life/",
    cover: "img/SITKOL.jpg"
  },  
  {
    title: "Bryter Layter",
    artist: "Nick Drake",
    rym: "https://rateyourmusic.com/release/album/nick-drake/bryter-layter/",
    cover: "img/bryterlayter.jpg"
  },
  {
    title: "Love Power Peace: Live at the Olympia, Paris, 1971",
    artist: "James Brown",
    rym: "https://rateyourmusic.com/release/album/james-brown/love-power-peace-live-at-the-olympia-paris-1971/",
    cover: "img/1971LPP.jpg"
  },
];

// ── RENDER ───────────────────────────────────────────────────────────────────
const grid = document.getElementById('albumGrid');

ALBUMS.forEach(album => {
  const card = document.createElement('div');
  card.className = 'album-card';
  card.innerHTML = `
    ${album.cover
      ? `<img src="${album.cover}" alt="${album.title}" loading="lazy">`
      : `<div class="album-placeholder">${album.title}</div>`
    }
    <div class="album-overlay">
      <div class="album-title">${album.title}</div>
      <div class="album-artist">${album.artist}</div>
    </div>
    <a href="${album.rym}" target="_blank" rel="noopener" aria-label="${album.title} on RYM"></a>
  `;
  grid.appendChild(card);
});
</script>
<script src="js/main.js"></script>
</body>
</html>
